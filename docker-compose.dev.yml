# Hot reload, debug ports, and development-specific configurations
# =============================================================================

version: '3.9'


services:
  # Main API application with hot reload
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dotnet-cqrs-api-dev
    ports:
      - "8080:8080"
      - "5678:5678"  # Debug port
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - EventStoreConnection=Server=sqlserver;Database=CqrsEventStore;User Id=sa;Password=YourPassword123!;TrustServerCertificate=true;Connect Timeout=30
      - RedisConnection=redis:6379
      - Logging__LogLevel__Default=Debug
      - Logging__LogLevel__Microsoft=Information
      - Logging__LogLevel__System=Information
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH=1
    volumes:
      - ./:/src:ro
      - sqldata:/var/opt/mssql
      - redisdata:/data
      - api-data:/app/data
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cqrs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SQL Server for event store
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dotnet-cqrs-sqlserver-dev
    environment:
      - SA_PASSWORD=YourPassword123!
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - MSSQL_COLLATION=SQL_Latin1_General_CP1_CI_AS
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - cqrs-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: dotnet-cqrs-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - cqrs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Adminer for database inspection
  adminer:
    image: adminer:latest
    container_name: dotnet-cqrs-adminer-dev
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlserver
    depends_on:
      - sqlserver
    networks:
      - cqrs-network
    restart: unless-stopped

volumes:
  sqldata:
    driver: local
  redisdata:
    driver: local
  api-data:
    driver: local

networks:
  cqrs-network:
    driver: bridge
